services:


  api:


    build:


      context: .


      dockerfile: docker/api.Dockerfile



    container_name:

      voice-translator-api



    ports:


      - "8000:8000"



    volumes:


      - ./models:/app/models

      - ./storages:/app/storages



    environment:


      - PYTHONUNBUFFERED=1



    restart:

      always





  web:


    build:


      context: .


      dockerfile: docker/web.Dockerfile



    container_name:

      voice-translator-web



    ports:


      - "5173:5173"



    depends_on:


      - api



    restart:

      always





  nginx:


    image:

      nginx:latest



    container_name:

      voice-translator-nginx



    ports:


      - "80:80"



    volumes:


      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf



    depends_on:


      - web

      - api