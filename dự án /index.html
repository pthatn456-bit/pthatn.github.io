<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang bán điện thoại</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
    <div class="top-banner">
        An tâm ở nhà <strong>TRỢ GIÁ HẾT MÌNH</strong>
    </div>

    <div class="navbar">
        <div class="logo">LOGO</div>

        <input type="text" placeholder="Bạn tìm gì...">

        <div class="menu-right">
            <span>🛒 Giỏ hàng</span>
            <span>Lịch sử</span>
            <span>24h Công nghệ</span>
        </div>
    </div>

    <div class="menu">
        <a href="#">Điện thoại</a>
        <a href="#">Laptop</a>
        <a href="#">Tablet</a>
        <a href="#">Phụ kiện</a>
        <a href="#">Đồng hồ</a>
        <a href="#">PC</a>
        <a href="#">Máy cũ</a>
        <a href="#">Sim</a>
    </div>
</header>

<!-- Banner -->
<section class="banner">

    <div class="left-banner">
        <img src="https://via.placeholder.com/750x350?text=Banner+Lớn" alt="">
    </div>

    <div class="right-banner">

        <div class="box">
            <img src="https://via.placeholder.com/260x165?text=iPhone+11" alt="">
        </div>

        <div class="box">
            <img src="https://via.placeholder.com/260x165?text=Samsung" alt="">
        </div>

        <div class="box">
            <img src="https://via.placeholder.com/260x165?text=Laptop+Gaming" alt="">
        </div>

        <div class="box">
            <img src="https://via.placeholder.com/260x165?text=AirPods" alt="">
        </div>

    </div>

</section>

<!-- Thanh quảng cáo -->
<div class="promo">
    Giảm ngay 5-45% | Mua online giao nhanh miễn phí
</div>

<!-- Sản phẩm -->
<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="">
        <h3>iPhone 12</h3>
        <p>Giảm đến 3 triệu</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="">
        <h3>Samsung S21</h3>
        <p>Giảm 15%</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="">
        <h3>Laptop Gaming</h3>
        <p>Giảm 2 triệu</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="">
        <h3>AirPods</h3>
        <p>Giảm 20%</p>
    </div>

</section>

</body>
</html>
