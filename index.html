<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Website Học Tập</title>
<style>
body{
    font-family:Arial;
    background:#eef5ff;
    text-align:center;
    margin-top:100px;
}
input{
    width:300px;
    padding:10px;
    font-size:18px;
}
button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
#msg{
    color:red;
    margin-top:15px;
}
</style>
</head>
<body>

<h1>📚 Website Học Tập</h1>

<input type="text" id="search" placeholder="Nhập Toán, Văn hoặc Hóa">

<button onclick="timKiem()">Tìm kiếm</button>

<p id="msg"></p>

<script>

const monHoc = {
    "toán":"toan.html",
    "toan":"toan.html",
    "văn":"van.html",
    "van":"van.html",
    "hóa":"hoa.html",
    "hoa":"hoa.html",
    

    "lý": "ly.html",
    "ly": "ly.html",

    "sử": "su.html",
    "su": "su.html",

    "địa": "dia.html",
    "dia": "dia.html",

    "sinh": "sinh.html",

    "tin học": "tin.html",
    "tin": "tin.html",

    "tiếng anh": "anh.html",
    "tieng anh": "anh.html",
    "anh": "anh.html"




};

function timKiem(){

    let key=document.getElementById("search")
            .value
            .trim()
            .toLowerCase();

    if(monHoc[key]){
        location.href=monHoc[key];
    }else{
        document.getElementById("msg").innerHTML=
        "❌ Không tìm thấy môn học.";
    }

}

</script>

</body>
</html>
