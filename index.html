<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Website Học Tập</title>
<style>
body{
    font-family:Arial;
    background:#eef5ff;
    text-align:center;
    margin-top:100px;
}
input{
    width:300px;
    padding:10px;
    font-size:18px;
}
button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
#msg{
    color:red;
    margin-top:15px;
}
</style>
</head>
<body>

<h1>📚 Website Học Tập</h1>

<input type="text" id="search" placeholder="Nhập Toán, Văn hoặc Hóa">

<button onclick="timKiem()">Tìm kiếm</button>

<p id="msg"></p>

<script>

const monHoc = {
    "toán":"page/toan.html",
    "toan":"page/toan.html",
    "văn":"page/van.html",
    "van":"page/van.html",
    "hóa":"page/hoa.html",
    "hoa":"page/hoa.html",
    

    "lý": "page/ly.html",
    "ly": "page/ly.html",

    "sử": "page/su.html",
    "su": "page/su.html",

    "địa": "page/dia.html",
    "dia": "page/dia.html",

    "sinh": "page/sinh.html",

    "tin học": "page/tin.html",
    "tin": "page/tin.html",

    "tiếng anh": "page/anh.html",
    "tieng anh": "page/anh.html",
    "anh": "page/anh.html"




};

function timKiem(){

    let key=document.getElementById("search")
            .value
            .trim()
            .toLowerCase();

    if(monHoc[key]){
        location.href=monHoc[key];
    }else{
        document.getElementById("msg").innerHTML=
        "❌ Không tìm thấy môn học.";
    }

}

</script>

</body>
</html>
