<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chương trình Hóa học</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fafafa;
}

header{
background:#ff9800;
color:white;
text-align:center;
padding:20px;
}

.container{

width:90%;

max-width:1000px;

margin:30px auto;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.card{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,.15);

text-align:center;

}

.card h2{

margin-bottom:15px;

}

.card a{

display:inline-block;

margin-top:15px;

padding:10px 18px;

background:#ff9800;

color:white;

text-decoration:none;

border-radius:8px;

}

.card a:hover{

background:#e68900;

}

.back{

display:inline-block;

margin-top:30px;

text-decoration:none;

background:#2196F3;

color:white;

padding:10px 18px;

border-radius:8px;

}

</style>

</head>

<body>

<header>

<h1>📚 Chương trình Hóa học</h1>

</header>

<div class="container">

<div class="grid">

<div class="card">

<h2>Hóa 10</h2>

<p>Kiến thức cơ bản lớp 10.</p>

<a href="#">Xem</a>

</div>

<div class="card">

<h2>Hóa 11</h2>

<p>Kiến thức lớp 11.</p>

<a href="#">Xem</a>

</div>

<div class="card">

<h2>Hóa 12</h2>

<p>Luyện thi THPT.</p>

<a href="#">Xem</a>

</div>

<div class="card">

<h2>Đề thi</h2>

<p>Đề thi và đáp án.</p>

<a href="#">Xem</a>

</div>

</div>

<a href="index.html" class="back">

 trang chủ

</a>

</div>

</body>
</html>
